name: Deploy Entregas Service

on:
  push:
    branches:
      - main

env:
  SERVICE_NAME: entregas-service
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/entregas-service
  K8S_DIR: kubernetes

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: |
          mvn clean package
          mvn test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Minikube
        run: |
          curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube
          minikube version

      - name: Start Minikube
        run: |
          minikube start --driver=docker
          minikube addons enable ingress
          minikube addons enable metrics-server

      - name: Deploy to Minikube
        run: |
          eval $(minikube -p minikube docker-env)
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          envsubst < ${{ env.K8S_DIR }}/deployment.yml > ${{ env.K8S_DIR }}/deployment-processed.yml
          kubectl apply -f ${{ env.K8S_DIR }}/deployment-processed.yml
          kubectl apply -f ${{ env.K8S_DIR }}/service.yml

      - name: Show initial pod status
        if: always()
        run: |
          echo "=== Pod Status After Apply ==="
          kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o wide > pod-status.txt
          cat pod-status.txt

      - name: Describe pods for debugging
        if: always()
        run: |
          echo "=== Pod Descriptions ==="
          kubectl describe pods --selector=app=${{ env.SERVICE_NAME }} > pod-describe.txt
          cat pod-describe.txt

      - name: Fetch container logs
        if: always()
        run: |
          echo "=== Container Logs ===" > container-logs.txt
          for pod in $(kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o name); do
            echo "--- Logs for $pod ---" >> container-logs.txt
            kubectl logs $pod --all-containers --tail=50 >> container-logs.txt || true
          done
          cat container-logs.txt

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entregas-service-debug-logs
          path: |
            pod-status.txt
            pod-describe.txt
            container-logs.txt

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.SERVICE_NAME }}-deployment --timeout=300s

      - name: Verify deployment
        run: |
          sleep 30
          MINIKUBE_IP=$(minikube ip)
          curl -sSf http://$MINIKUBE_IP:30083/actuator/health
          curl -sSf http://$MINIKUBE_IP:30083/actuator/prometheus | head -n 5

      - name: Cleanup
        if: always()
        run: |
          minikube stop
          minikube delete
