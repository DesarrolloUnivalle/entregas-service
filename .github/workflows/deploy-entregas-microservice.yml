name: Deploy Entregas Service

on:
  push:
    branches:
      - main

env:
  SERVICE_NAME: entregas-service
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/entregas-service
  K8S_DIR: kubernetes

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: |
          mvn clean package
          mvn test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Install Minikube
        run: |
          curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube
          minikube version

      - name: Start Minikube
        run: |
          minikube start --driver=docker
          minikube addons enable ingress
          minikube addons enable metrics-server

      - name: Deploy to Minikube
        run: |
          # Configurar el entorno de Docker de Minikube
          eval $(minikube -p minikube docker-env)
          # Construir la imagen en el entorno de Minikube
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          # Reemplazar variables en los archivos de Kubernetes
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          envsubst < ${{ env.K8S_DIR }}/deployment.yml > ${{ env.K8S_DIR }}/deployment-processed.yml
          # Aplicar los manifiestos de Kubernetes
          kubectl apply -f ${{ env.K8S_DIR }}/deployment-processed.yml
          kubectl apply -f ${{ env.K8S_DIR }}/service.yml

          # Log básico tras aplicar
          echo "=== Pods actuales tras apply ==="
          kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o wide
          echo "=== Events recientes ==="
          kubectl get events --sort-by='.metadata.creationTimestamp' | tail -n 20

          # Esperar a que el despliegue esté listo, con timeout aumentado
          kubectl rollout status deployment/${{ env.SERVICE_NAME }}-deployment --timeout=300s

        # Capturar fallo en este bloque:
      - name: Debug pods if rollout fails
        if: failure()
        run: |
          echo "=== DESCRIBE PODS TRAS ROLLOUT ==="
          kubectl describe pods --selector=app=${{ env.SERVICE_NAME }} -o wide
          echo "=== EVENTS DETALLADOS ==="
          kubectl get events --sort-by='.metadata.creationTimestamp' | tail -n 50
          # Recoger logs de cada pod
          for pod in $(kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o name); do
            echo "---- Logs de $pod ----"
            kubectl logs $pod --all-containers || true
          done
          # También revisar si hay init-containers fallando
          echo "=== Estado de init-containers y contenedores ==="
          kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o jsonpath='{range .items[*]}{.metadata.name}{" init:"}{.status.initContainerStatuses[*].state}{" cont:"}{.status.containerStatuses[*].state}{"\n"}{end}'

      - name: Upload debug logs as artifact
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: entregas-service-debug-logs
          path: |
            # Generar un pequeño archivo con describe y events
            ./save_debug.sh || echo "no save script"
        # Alternativa: en el paso anterior podrías redirigir la salida a archivos y subirlos:
        # run: |
        #   mkdir -p debug
        #   kubectl describe pods --selector=app=${{ env.SERVICE_NAME }} > debug/describe.txt || true
        #   kubectl get events --sort-by='.metadata.creationTimestamp' > debug/events.txt || true
        #   for pod in $(kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o name); do
        #     kubectl logs $pod --all-containers > debug/logs-${pod##*/}.txt || true
        #   done
        # with:
        #   name: entregas-service-debug-logs
        #   path: debug

      - name: Verify deployment
        run: |
          # Esperar a que el servicio esté listo
          sleep 30
          MINIKUBE_IP=$(minikube ip)
          echo "Health endpoint:"
          curl -sSf http://$MINIKUBE_IP:30083/actuator/health
          echo "Prometheus endpoint (head):"
          curl -sSf http://$MINIKUBE_IP:30083/actuator/prometheus | head -n 5
        # Si falla aquí, también podemos capturar logs:
      - name: Debug verify if fails
        if: failure()
        run: |
          echo "=== Pods status al verificar endpoints ==="
          kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o wide
          for pod in $(kubectl get pods --selector=app=${{ env.SERVICE_NAME }} -o name); do
            echo "---- Logs de $pod ----"
            kubectl logs $pod --all-containers || true
          done

      - name: Cleanup
        if: always()
        run: |
          minikube stop
          minikube delete
